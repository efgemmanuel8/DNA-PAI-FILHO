<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<title>Formulário</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
    }

    .container {
        width: 400px;
        margin: 50px auto;
        background: #fff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
		color:#4f4f4f;
        text-align: center;
    }

    label {
        display: block;
        margin-top: 10px;
        color:#4f4f4f; /* texto cinzento */
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    input::placeholder {
        color: grey; /* placeholder cinzento */
    }

    .botoes {
        margin-top: 15px;
        display: flex;
        justify-content: space-between;
    }

    button {
        padding: 15px 50px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    .enviar {
        background-color: #24a4c6;
        color: white;
    }

    .voltar {
        background-color: #24a4c6;
        color: white;
    }
</style>

</head>
<body>

<div class="container">
    <h2>Formulário de Cadastro</h2>

    <form action="#" method="post">

        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" name="nome" placeholder="Introduza o seu nome completo" required>

        <label for="endereco">Endereço</label>
        <input type="text" id="endereco" name="endereco" placeholder="Introduza o seu endereço" required>

        <label for="telefone">Número de Telefone</label>
        <input type="tel" id="telefone" name="telefone" placeholder="Introduza o seu número de telefone" required>

        <label for="whatsapp">Número de WhatsApp</label>
        <input type="tel" id="whatsapp" name="whatsapp" placeholder="Introduza o seu WhatsApp" required>

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="Introduza o seu e-mail" required>

        <div class="botoes">
            <button type="button" class="voltar" onclick="history.back()">Voltar</button>
            <button type="submit" class="enviar">Submeter</button>
        </div>

    </form>
</div>

</body>
</html>
